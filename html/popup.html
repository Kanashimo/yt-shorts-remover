<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/css/popup.css">
</head>
<body>
    <div id="logo">
        <img src="/img/logo.png" alt="YouTube Shorts Remover">
        <h1>YouTube Shorts Remover</h1>
    </div>
    <div id="settings">
        <div>
            <label>Block shorts from...</label>
        </div>
        <div>
        <span>Homepage</span>
        <input type="checkbox" id="homepage">
        </div>
        <div>
        <span>Search</span>
        <input type="checkbox" id="search">
        </div>
        <div>
        <span>Navbar</span>
        <input type="checkbox" id="navbar">
        </div>
        <div>
        <span>Whole URL (/shorts)</span>
        <input type="checkbox" id="url">
        </div>
    </div>
    <script src="/popup.js"></script>
</body>
</html>
