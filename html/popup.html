<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/css/popup.css">
</head>
<body class="toggler-preload">
    <div id="logo">
        <img src="/img/logo.png" alt="YouTube Shorts Remover">
        <h1>YouTube Shorts Remover</h1>
    </div>
    <div id="settings">
        <div>
            <span>Homepage</span>
            <label class="toggler">
                <input type="checkbox" id="homepage">
                <div class="toggler-slider">
                    <div class="toggler-knob"></div>
                </div>
            </label>
        </div>
        <div>
            <span>Search</span>
            <label class="toggler">
                <input type="checkbox" id="search">
                <div class="toggler-slider">
                    <div class="toggler-knob"></div>
                </div>
            </label>
        </div>
        <div>
            <span>Navbar</span>
            <label class="toggler">
                <input type="checkbox" id="navbar">
                <div class="toggler-slider">
                    <div class="toggler-knob"></div>
                </div>
            </label>
        </div>
        <div>
            <span>Whole URL (/shorts)</span>
            <label class="toggler">
                <input type="checkbox" id="url">
                <div class="toggler-slider">
                    <div class="toggler-knob"></div>
                </div>
            </label>
        </div>
    </div>
    <script src="/popup.js"></script>
</body>
</html>
